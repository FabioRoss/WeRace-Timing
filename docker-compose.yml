networks:
  edge:
    external: true

services:
  app:
    build: .
    restart: unless-stopped
    container_name: werace-timing-app
    # Required: create backend/.env first (see backend/.env.example)
    env_file: backend/.env
    volumes:
      - recordings:/app/backend/recordings
      - backgrounds:/app/backend/backgrounds
      - snapshots:/app/backend/snapshots
    expose:
      - "8000"
    networks:
      - edge

volumes:
  recordings:
  backgrounds:
  snapshots:
  caddy_data:
  caddy_config:
